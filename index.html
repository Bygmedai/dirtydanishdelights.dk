<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Midlertidigt lukket</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0A0806;
            color: #F0E6D4;
            font-family: 'Cormorant Garamond', Georgia, serif;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2rem;
            color: #C4A265;
            margin-bottom: 1rem;
            font-weight: 300;
            letter-spacing: 0.1em;
        }
        p {
            font-size: 1.1rem;
            opacity: 0.7;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vi er tilbage snart</h1>
        <p>Siden er midlertidigt lukket.<br>Vi beklager ulejligheden.</p>
    </div>
</body>
</html>
